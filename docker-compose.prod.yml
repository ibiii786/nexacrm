version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexacrm-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nexacrm}
      POSTGRES_USER: ${DB_USER:-nexacrm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexacrm_prod_secure}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nexacrm-redis-prod
    restart: unless-stopped
    volumes:
      - redis_data_prod:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nexacrm-api-prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-nexacrm}:${DB_PASSWORD:-nexacrm_prod_secure}@postgres:5432/${DB_NAME:-nexacrm}?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=3001
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-generate_a_secure_secret_for_production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-generate_another_secure_secret}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
    depends_on:
      - postgres
      - redis
    command: >
      sh -c "npx prisma migrate deploy && npm run start"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: nexacrm-web-prod
    restart: unless-stopped
    ports:
      - "80:80"
      # If you are configuring SSL directly with Docker, map 443 as well.
      # - "443:443"
    depends_on:
      - api

volumes:
  postgres_data_prod:
  redis_data_prod:
