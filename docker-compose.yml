version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexacrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexacrm
      POSTGRES_USER: nexacrm
      POSTGRES_PASSWORD: nexacrm_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nexacrm-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
