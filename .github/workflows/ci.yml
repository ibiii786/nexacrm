name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build API
      run: npm run build -w @nexacrm/api

    - name: Build Web
      run: npm run build -w @nexacrm/web

    - name: Run Tests (API)
      run: npm run test -w @nexacrm/api

    # - name: Run Tests (Web)
    #   run: npm run test -w @nexacrm/web
